name: Build and Release

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - ".env*"
      - ".gitignore"
      - ".gitattributes"
      - "LICENSE"
      - ".editorconfig"
      - ".vscode/**"
      - ".idea/**"
      - "cookies.*.json"
      - "cache.*.json"
      - docker-compose.yml
      - docker-compose.source.yml

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    name: Cross-compile and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # OPTIMIZATION 1: Only install production dependencies
      - name: Install dependencies
        run: bun install --production

      # OPTIMIZATION 2: Prune dev files & backup cycletls
      - name: Prune node_modules and setup cycletls backup
        run: |
          # Wipe out markdown, sourcemaps, typings, and licenses globally
          find node_modules -type f \( -name "*.md" -o -name "*.map" -o -name "*.d.ts" -o -name "LICENSE" \) -delete

          # Create a pristine backup of the cycletls binaries so we can swap them per-target
          cp -r node_modules/cycletls/dist ./cycletls_backup

      - name: Create dist directory
        run: mkdir -p dist

      # ---------------------------------------------------------
      # Cross-compilation Steps (Corrected Binary Pruning)
      # ---------------------------------------------------------

      - name: Build for Linux (x64)
        run: |
          rm -rf node_modules/cycletls/dist && cp -r ./cycletls_backup node_modules/cycletls/dist
          (cd node_modules/cycletls/dist && rm -f index-arm index-arm64 index.exe index-freebsd index-mac index-mac-arm64)
          bun build ./src/index.ts --compile --minify --target=bun-linux-x64 --outfile dist/touitomamout-linux-x64

      - name: Build for Linux (x64, musl)
        run: |
          rm -rf node_modules/cycletls/dist && cp -r ./cycletls_backup node_modules/cycletls/dist
          (cd node_modules/cycletls/dist && rm -f index-arm index-arm64 index.exe index-freebsd index-mac index-mac-arm64)
          bun build ./src/index.ts --compile --minify --target=bun-linux-x64-musl --outfile dist/touitomamout-linux-x64-musl

      - name: Build for Linux (arm64, musl)
        run: |
          rm -rf node_modules/cycletls/dist && cp -r ./cycletls_backup node_modules/cycletls/dist
          (cd node_modules/cycletls/dist && rm -f index index-arm index.exe index-freebsd index-mac index-mac-arm64)
          bun build ./src/index.ts --compile --minify --target=bun-linux-arm64-musl --outfile dist/touitomamout-linux-arm64-musl

      - name: Build for Windows (x64)
        run: |
          rm -rf node_modules/cycletls/dist && cp -r ./cycletls_backup node_modules/cycletls/dist
          (cd node_modules/cycletls/dist && rm -f index index-arm index-arm64 index-freebsd index-mac index-mac-arm64)
          bun build ./src/index.ts --compile --minify --target=bun-windows-x64 --outfile dist/touitomamout-windows-x64.exe

      - name: Build for macOS (Intel x64)
        run: |
          rm -rf node_modules/cycletls/dist && cp -r ./cycletls_backup node_modules/cycletls/dist
          (cd node_modules/cycletls/dist && rm -f index index-arm index-arm64 index.exe index-freebsd index-mac-arm64)
          bun build ./src/index.ts --compile --minify --target=bun-darwin-x64 --outfile dist/touitomamout-macos-x64

      - name: Build for macOS (Apple Silicon arm64)
        run: |
          rm -rf node_modules/cycletls/dist && cp -r ./cycletls_backup node_modules/cycletls/dist
          (cd node_modules/cycletls/dist && rm -f index index-arm index-arm64 index.exe index-freebsd index-mac)
          bun build ./src/index.ts --compile --minify --target=bun-darwin-arm64 --outfile dist/touitomamout-macos-arm64
      # ---------------------------------------------------------
      # Tagging and Releasing
      # ---------------------------------------------------------

      - name: Generate Timestamp Tag
        id: tag_gen
        run: |
          echo "VERSION_TAG=v$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: Release ${{ env.VERSION_TAG }}
          draft: false
          prerelease: false
          files: |
            dist/touitomamout-linux-x64
            dist/touitomamout-linux-x64-musl
            dist/touitomamout-linux-arm64-musl
            dist/touitomamout-windows-x64.exe
            dist/touitomamout-macos-x64
            dist/touitomamout-macos-arm64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
